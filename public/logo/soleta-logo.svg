<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none" role="img" aria-label="Soleta Homes">
  <!-- Wordmark: light version — white, for use on dark/brand backgrounds -->

  <!-- Mark: minimal triangular house glyph -->
  <path d="M14 34 L22 22 L30 34" stroke="#ffffff" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <line x1="18" y1="34" x2="26" y2="34" stroke="#ffffff" stroke-width="1.2" stroke-linecap="square"/>
  <line x1="22" y1="28" x2="22" y2="34" stroke="#ffffff" stroke-width="1.2" stroke-linecap="square"/>

  <!-- SOLETA wordmark -->
  <text
    x="40"
    y="32"
    font-family="'Le Grand Capital', 'Playfair Display', Georgia, serif"
    font-size="15"
    font-weight="400"
    letter-spacing="4"
